  <!-- Left serif -->
  <line x1="9" y1="22" x2="23" y2="22" stroke="#B84040" stroke-width="5" stroke-linecap="round"/>
  <!-- Right serif -->
  <line x1="77" y1="22" x2="91" y2="22" stroke="#B84040" stroke-width="5" stroke-linecap="round"/>

  <!-- V arms -->
  <line x1="16" y1="22" x2="50" y2="74" stroke="#B84040" stroke-width="5" stroke-linecap="round"/>
  <line x1="84" y1="22" x2="50" y2="74" stroke="#B84040" stroke-width="5" stroke-linecap="round"/>

